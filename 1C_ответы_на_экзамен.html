  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #232640;
    --accent: #7c6ef7;
    --accent2: #4fc3f7;
    --correct: #4ade80;

    --muted: #8892a4;
    --border: #2e3354;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #232640 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  header p { color: var(--muted); font-size: 13px; }

  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .stat { text-align: center; }
  .stat-n { font-size: 24px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .stat-l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .search-bar {
    display: flex;
    justify-content: center;
    padding: 16px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .search-bar input {
    width: 100%;
    max-width: 600px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 32px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-title span {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .section-title hr { flex: 1; border: none; border-top: 1px solid var(--border); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 10px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateX(2px);
  }

  .card-num {
    position: absolute;
    top: -1px;
    right: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 0 0 6px 6px;
  }

  .question {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
    padding-right: 40px;
  }

  .answer {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 14px;
    color: var(--correct);
    font-weight: 600;
  }

  .check { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .hidden { display: none !important; }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    display: none;
  }
</style>

const container = document.getElementById('cards-container');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');
const visibleCount = document.getElementById('visible-count');

totalCount.textContent = qa.length;
visibleCount.textContent = qa.length;

// Group by topic (every ~8 questions)
const sections = [
  { label: "Модули", end: 8 },
  { label: "Переменные и типы данных", end: 22 },
  { label: "Настройка и логика", end: 30 },
  { label: "Строки и отладка", end: 45 },
  { label: "Конфигурация и система", end: 65 },
  { label: "Макеты, запросы, права", end: 80 },
  { label: "Язык и анализ данных", end: 90 },
  { label: "События, справочники, операторы", end: qa.length },
];

let sIdx = 0;
qa.forEach(([q, a], i) => {
  // Section headers
  if (sIdx < sections.length && i === (sIdx === 0 ? 0 : sections[sIdx-1].end)) {
    const div = document.createElement('div');
    div.className = 'section-title';
    div.innerHTML = `<span>${sections[sIdx].label}</span><hr>`;
    div.dataset.sectionTitle = true;
    container.appendChild(div);
    sIdx++;
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.q = q.toLowerCase();
  card.dataset.a = a.toLowerCase();
  card.innerHTML = `
    <div class="card-num">${String(i+1).padStart(2,'0')}</div>
    <div class="question">${q}</div>
    <div class="answer"><span class="check">✓</span><span>${a}</span></div>
  `;
  container.appendChild(card);
});

function filterCards() {
  const val = document.getElementById('search').value.toLowerCase().trim();
  let count = 0;
  document.querySelectorAll('.card').forEach(c => {
    const match = !val || c.dataset.q.includes(val) || c.dataset.a.includes(val);
    c.classList.toggle('hidden', !match);
    if (match) count++;
  });
  document.querySelectorAll('.section-title').forEach(s => s.classList.toggle('hidden', !!val));
  noResults.style.display = count === 0 ? 'block' : 'none';
  visibleCount.textContent = count;
}
